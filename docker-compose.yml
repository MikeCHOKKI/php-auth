services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: php-auth-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini:ro
    networks:
      - php-auth-network
    depends_on:
      - postgres
    environment:
      - APP_ENV=${APP_ENV:-development}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-php_auth}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - JWT_PRIVATE_KEY_PATH=/var/www/keys/private.pem
      - JWT_PUBLIC_KEY_PATH=/var/www/keys/public.pem

  nginx:
    image: nginx:alpine
    container_name: php-auth-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - php-auth-network
    depends_on:
      - app

  postgres:
    image: postgres:15-alpine
    container_name: php-auth-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-php_auth}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - php-auth-network

volumes:
  postgres_data:

networks:
  php-auth-network:
    driver: bridge
