name: Coverage Report

on:
  workflow_run:
    workflows: [ CI ]
    types: [ completed ]
    branches: [ main, develop ]

permissions:
  contents: write

jobs:
  coverage-report:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: xdebug

      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Generate test keys
        run: make generate-test-keys

      - name: Generate coverage reports
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE: php_auth_test
          DB_USERNAME: postgres
          DB_PASSWORD: secret
          JWT_PRIVATE_KEY_PATH: keys/private.pem
          JWT_PUBLIC_KEY_PATH: keys/public.pem
        run: vendor/bin/phpunit --coverage-clover coverage.xml --coverage-html
          coverage-html

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            coverage-html/
          retention-days: 30

      - name: Send notification
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}`;
            const codecovUrl = 'https://app.codecov.io/gh/MikeCHOKKI/php-auth';

            // Créer un commentaire sur le commit
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: '${{ github.event.workflow_run.head_sha }}',
              body: `
                ## Coverage Report Generated
                
                Coverage reports uploaded as artifacts (retention: 30 days).
                
                - **Branch**: ${{ github.ref_name }}
                - **Commit**: \`${{ github.event.workflow_run.head_sha }}\`
                - **View Artifacts**: [${{ github.event.workflow_run.id }}](${runUrl})
                - **View Codecov**: [php-auth](${codecovUrl})
              `
            });
